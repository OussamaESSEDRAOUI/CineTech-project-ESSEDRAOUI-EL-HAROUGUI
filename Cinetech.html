<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CineTech</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="cinetech.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="top-header">

  <!-- Bouton toggle sidebar -->
  <button id="toggleSidebar">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Titre du site -->
  <h1 class="site-title">
    <span class="cine">CINE</span><span class="tech">TECH</span>
  </h1>

</header>

<!-- ======== BARRE DE RECHERCHE GLOBALE ======== -->
<div class="global-search">
  <input type="text" id="globalSearch" placeholder="Rechercher un film ou un réalisateur...">
</div>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar active">

  <button onclick="showSection('dashboard')">
    <i class="fas fa-chart-line"></i> Dashboard
  </button>

  <button onclick="showSection('films')">
    <i class="fas fa-film"></i> Films
  </button>

  <button onclick="showSection('directors')">
    <i class="fas fa-user-tie"></i> Réalisateurs
  </button>

  <button onclick="showSection('auth')">
    <i class="fas fa-user"></i> Connexion
  </button>

  <button onclick="toggleTheme()">🌙 / ☀️ Mode</button>

</aside>

<!-- ================= MAIN ================= -->
<main>

<!-- ============ DASHBOARD ============ -->
<section id="dashboard" class="section active">
  <h2>Dashboard</h2>

  <div class="kpi">
    <div class="card">🎬 Films <span id="totalFilms">0</span></div>
    <div class="card">🎥 Réalisateurs <span id="totalDirectors">0</span></div>
  </div>

  <canvas id="filmsChart"></canvas>
</section>

<!-- ============ FILMS ============ -->
<section id="films" class="section">
  <h2>Gestion des Films</h2>

  <form id="filmForm">
    <input type="hidden" id="editIndex">
    <input type="text" id="title" placeholder="Titre">
    <input type="number" id="year" placeholder="Année">
    <input type="text" id="genre" placeholder="Genre">
    <button type="submit">Enregistrer</button>
  </form>

  <div class="film-grid" id="filmList"></div>
</section>

<!-- ============ REALISATEURS ============ -->
<section id="directors" class="section">
  <h2>Réalisateurs</h2>

  <form id="directorForm">
    <input type="text" id="directorName" placeholder="Nom du réalisateur">
    <button>Ajouter</button>
  </form>

  <ul id="directorList"></ul>
</section>

<!-- ============ AUTH ============ -->
<section id="auth" class="section">
  <h2>Authentification</h2>

  <form id="loginForm">
    <h3>Connexion</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Se connecter</button>
  </form>

  <form id="registerForm">
    <h3>Inscription</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>S'inscrire</button>
  </form>
</section>

</main>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2025 CineTech – Projet académique</p>
  <p>Support client | Mentions légales | Contact</p>
</footer>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="Javascript/NavigationSPA.js"></script>
<script src="Javascript/Films.js"></script>
<script src="Javascript/Realisateurs.js"></script>
<script src="Javascript/Dashboard.js"></script>
<script src="Javascript/API.js"></script>
<script src="Javascript/auth.js"></script>

</body>
</html>
