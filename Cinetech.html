<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CineTech</title>

  <link rel="stylesheet" href="cinetech.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= POPUP ================= -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <p id="popupMessage"></p>
    <div class="popup-actions">
      <button id="popupConfirm">OK</button>
      <button id="popupCancel" class="danger">Annuler</button>
    </div>
  </div>
</div>

<!-- ================= HEADER ================= -->
<header class="top-header">
  <button id="toggleSidebar"><i class="fas fa-bars"></i></button>
  <h1 class="site-title"><span class="cine">CINE</span><span class="tech">TECH</span></h1>
</header>

<!-- ================= SEARCH ================= -->
<div class="global-search">
  <input type="text" id="globalSearch" placeholder="Rechercher films ou réalisateurs...">
</div>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar active">
  <button onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
  <button onclick="showSection('films')"><i class="fas fa-film"></i> Films</button>
  <button onclick="showSection('directors')"><i class="fas fa-user-tie"></i> Réalisateurs</button>
  <button onclick="showSection('auth')"><i class="fas fa-user"></i> Auth</button>
  <button onclick="toggleTheme()"> Mode Sombre🌙 / Claire☀️ </button>
</aside>

<!-- ================= MAIN ================= -->
<main>

<section id="dashboard" class="section active">
  <h2>Dashboard</h2>
  <div class="kpi">
    <div class="card">🎬 Films <span id="totalFilms">0</span></div>
    <div class="card">🎥 Réalisateurs <span id="totalDirectors">0</span></div>
  </div>
  <canvas id="filmsChart"></canvas>
</section>

<section id="films" class="section">
  <h2>Gestion des Films</h2>

  <input type="text" id="filmSearch" placeholder="Rechercher un film...">
  <select id="filmSort">
    <option value="">Trier</option>
    <option value="az">A–Z</option>
    <option value="year">Année</option>
  </select>

  <form id="filmForm">
    <input type="hidden" id="editIndex">
    <input type="text" id="title" placeholder="Titre" required>
    <input type="number" id="year" placeholder="Année" required>
    <input type="text" id="genre" placeholder="Genre">
    <button>Enregistrer</button>
  </form>

  <div class="film-grid" id="filmList"></div>
</section>

<section id="directors" class="section">
  <h2>Réalisateurs</h2>
  <input type="text" id="directorSearch" placeholder="Rechercher un réalisateur...">
  <form id="directorForm">
    <input type="text" id="directorName" placeholder="Nom" required>
    <button>Ajouter</button>
  </form>
  <ul id="directorList"></ul>
</section>

<section id="auth" class="section">
  <h2>Authentification</h2>

  <form id="loginForm">
    <h3>Connexion</h3>
    <input type="text" id="loginUser" placeholder="Username" required>
    <input type="password" id="loginPass" placeholder="Password" required>
    <button>Se connecter</button>
  </form>

  <form id="registerForm">
    <h3>Inscription</h3>
    <input type="text" id="registerUser" placeholder="Username" required>
    <input type="password" id="registerPass" placeholder="Password" required>
    <button>S'inscrire</button>
  </form>
</section>

</main>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2025 CineTech — Projet académique</p>
  <p>
    <span>Support Client</span> |
    <span>Contact</span> |
    <span>Mentions légales</span>
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="Javascript/NavigationSPA.js"></script>
<script src="Javascript/Films.js"></script>
<script src="Javascript/Realisateurs.js"></script>
<script src="Javascript/Dashboard.js"></script>
<script src="Javascript/API.js"></script>
<script src="Javascript/auth.js"></script>
</body>
</html>
